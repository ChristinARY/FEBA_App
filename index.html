<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEBA – Application de Gestion Scolaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a3c5e;
    --primary-light: #2563a8;
    --accent: #f59e0b;
    --accent2: #10b981;
    --danger: #ef4444;
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --border: #e2e8f0;
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --sidebar-w: 240px;
    --header-h: 64px;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --shadow-md: 0 4px 24px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2942 0%, #1a3c5e 50%, #0e4f8a 100%);
    position: relative; overflow: hidden;
  }
  #login-screen::before {
    content:''; position:absolute; width:600px; height:600px; border-radius:50%;
    background: rgba(245,158,11,.08); top:-200px; right:-200px;
  }
  #login-screen::after {
    content:''; position:absolute; width:400px; height:400px; border-radius:50%;
    background: rgba(37,99,168,.15); bottom:-150px; left:-100px;
  }
  .login-card {
    background: white; border-radius: 20px; padding: 48px 40px; width: 400px; max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,.3); position: relative; z-index: 1;
  }
  .login-logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
  }
  .login-logo-icon {
    width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: white; font-family: 'Syne', sans-serif; font-weight: 800;
  }
  .login-logo h1 { font-size: 24px; color: var(--primary); }
  .login-logo p { font-size: 12px; color: var(--text3); margin-top: -2px; }
  .login-title { font-size: 20px; margin-bottom: 8px; }
  .login-sub { color: var(--text2); font-size: 14px; margin-bottom: 28px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    font-family: inherit; font-size: 14px; color: var(--text); background: var(--surface2);
    transition: border .2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--primary-light); background: white;
  }
  .role-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .role-tab {
    flex:1; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--surface2); cursor: pointer; text-align: center; font-size: 13px;
    font-weight: 600; color: var(--text2); transition: all .2s; font-family: inherit;
  }
  .role-tab.active { border-color: var(--primary-light); background: #eff6ff; color: var(--primary-light); }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #d97706; }
  .btn-success { background: var(--accent2); color: white; }
  .btn-success:hover { background: #059669; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #dc2626; }
  .btn-outline { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
  .btn-outline:hover { background: var(--primary); color: white; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-full { width: 100%; justify-content: center; }
  .btn-icon { width: 36px; height: 36px; padding: 0; justify-content: center; }

  /* LAYOUT */
  #app { display: none; min-height: 100vh; }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w);
    background: var(--primary); overflow-y: auto; z-index: 100;
    display: flex; flex-direction: column;
  }
  .sidebar-brand {
    padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,.1);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-brand-icon {
    width: 38px; height: 38px; background: var(--accent); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; color: white; font-size: 16px;
  }
  .sidebar-brand-text h2 { color: white; font-size: 16px; }
  .sidebar-brand-text p { color: rgba(255,255,255,.5); font-size: 11px; }
  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-section { padding: 8px 16px 4px; font-size: 10px; font-weight: 700; color: rgba(255,255,255,.35); letter-spacing: 1.2px; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; color: rgba(255,255,255,.7); cursor: pointer;
    font-size: 13.5px; font-weight: 500; transition: all .15s; border-left: 3px solid transparent;
    margin: 1px 0;
  }
  .nav-item:hover { background: rgba(255,255,255,.07); color: white; }
  .nav-item.active { background: rgba(255,255,255,.12); color: white; border-left-color: var(--accent); }
  .nav-item .ni { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-user {
    padding: 14px 16px; border-top: 1px solid rgba(255,255,255,.1);
    display: flex; align-items: center; gap: 10px; cursor: pointer;
  }
  .sidebar-user-avatar {
    width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 13px;
  }
  .sidebar-user-info { flex: 1; min-width: 0; }
  .sidebar-user-info p { color: white; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-user-info span { color: rgba(255,255,255,.5); font-size: 11px; }

  .main { margin-left: var(--sidebar-w); min-height: 100vh; }
  .topbar {
    position: sticky; top: 0; height: var(--header-h); background: white;
    border-bottom: 1px solid var(--border); display: flex; align-items: center;
    padding: 0 24px; gap: 16px; z-index: 50; box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .topbar-title { font-size: 18px; font-weight: 700; flex: 1; }
  .content { padding: 24px; }

  /* CARDS */
  .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-header h3 { font-size: 15px; font-weight: 700; }
  .card-body { padding: 20px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: white; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
    display: flex; align-items: flex-start; gap: 14px;
  }
  .stat-icon {
    width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  .stat-icon.blue { background: #eff6ff; }
  .stat-icon.amber { background: #fffbeb; }
  .stat-icon.green { background: #f0fdf4; }
  .stat-icon.purple { background: #faf5ff; }
  .stat-icon.red { background: #fff5f5; }
  .stat-info p { font-size: 26px; font-weight: 800; font-family: 'Syne', sans-serif; line-height: 1; }
  .stat-info span { font-size: 13px; color: var(--text2); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead tr { background: var(--surface2); }
  th { padding: 11px 14px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1.5px solid var(--border); }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* BADGE */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #dcfce7; color: #16a34a; }
  .badge-red { background: #fee2e2; color: #dc2626; }
  .badge-amber { background: #fef3c7; color: #d97706; }
  .badge-blue { background: #dbeafe; color: #2563eb; }
  .badge-purple { background: #ede9fe; color: #7c3aed; }
  .badge-gray { background: #f1f5f9; color: #64748b; }

  /* AVATAR */
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 13px; color: white; flex-shrink: 0;
  }
  .avatar-info { display: flex; align-items: center; gap: 10px; }
  .avatar-info .name { font-weight: 600; font-size: 14px; }
  .avatar-info .sub { font-size: 12px; color: var(--text2); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: white; border-radius: 16px; width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-md);
    transform: translateY(20px); transition: transform .2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 17px; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

  /* FORM GRID */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid .full { grid-column: 1/-1; }

  /* SEARCH BAR */
  .search-bar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .search-input-wrap {
    position: relative; flex: 1; min-width: 200px;
  }
  .search-input-wrap input {
    width: 100%; padding: 9px 12px 9px 36px; border: 1.5px solid var(--border);
    border-radius: 8px; font-family: inherit; font-size: 14px; background: white;
  }
  .search-input-wrap input:focus { outline: none; border-color: var(--primary-light); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
  .tab {
    padding: 10px 18px; font-size: 14px; font-weight: 600; color: var(--text2);
    cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; font-family: inherit; background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab.active { color: var(--primary-light); border-bottom-color: var(--primary-light); }

  /* PAGES */
  .page { display: none; animation: fadein .2s; }
  .page.active { display: block; }
  @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* MESSAGES */
  .msg-list { display: flex; flex-direction: column; gap: 2px; }
  .msg-item {
    padding: 14px 16px; border-radius: 8px; cursor: pointer; display: flex; gap: 12px;
    align-items: flex-start; border: 1px solid transparent; transition: all .15s;
  }
  .msg-item:hover { background: var(--surface2); }
  .msg-item.unread { background: #eff6ff; border-color: #bfdbfe; }
  .msg-item .msg-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .msg-item .msg-body { flex: 1; min-width: 0; }
  .msg-item .msg-from { font-weight: 600; font-size: 13px; }
  .msg-item .msg-subject { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-item .msg-date { font-size: 11px; color: var(--text3); flex-shrink: 0; }

  /* NOTIF */
  .notif-dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; }

  /* TIMELINE */
  .timeline { display: flex; flex-direction: column; gap: 16px; }
  .timeline-item { display: flex; gap: 12px; }
  .timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary-light); flex-shrink: 0; margin-top: 5px; }
  .timeline-content { flex: 1; }
  .timeline-content h4 { font-size: 13px; font-weight: 600; }
  .timeline-content p { font-size: 12px; color: var(--text2); }

  /* BULLETIN STYLE */
  .bulletin {
    border: 2px solid var(--primary); border-radius: 12px; padding: 24px;
    max-width: 600px; background: white;
  }
  .bulletin-header { text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 16px; }
  .bulletin-header h2 { font-size: 20px; color: var(--primary); }
  .bulletin table th { background: var(--primary); color: white; }

  /* CHART PLACEHOLDER */
  .chart-placeholder {
    height: 220px; background: var(--surface2); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    gap: 8px; color: var(--text3);
  }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; padding: 0 8px; }
  .bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .bar { width: 100%; background: var(--primary-light); border-radius: 4px 4px 0 0; transition: height .5s; min-height: 4px; }
  .bar-label { font-size: 11px; color: var(--text2); text-align: center; }

  /* SIDEBAR OVERLAY (mobile) */
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 99; cursor: pointer;
  }
  .sidebar-overlay.visible { display: block; }

  /* CLOSE BUTTON inside sidebar (mobile only) */
  .sidebar-close {
    display: none;
    position: absolute; top: 14px; right: 12px;
    background: rgba(255,255,255,.15); border: none; border-radius: 8px;
    color: white; font-size: 18px; width: 32px; height: 32px;
    align-items: center; justify-content: center; cursor: pointer;
    line-height: 1;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    :root { --sidebar-w: 0px; }
    .sidebar {
      transform: translateX(-240px); width: 240px;
      transition: transform .3s; position: fixed; z-index: 100;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-close { display: flex; }
    .main { margin-left: 0 !important; }
    .grid-2, .grid-3, .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    #menu-btn { display: block !important; }
  }

  /* EMPLOI DU TEMPS */
  .timetable { display: grid; grid-template-columns: 80px repeat(5, 1fr); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; font-size: 12px; }
  .tt-header { background: var(--primary); color: white; padding: 8px; text-align: center; font-weight: 700; font-size: 11px; }
  .tt-hour { background: var(--surface2); padding: 8px; text-align: center; color: var(--text2); font-weight: 600; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); font-size: 11px; }
  .tt-cell { padding: 6px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 50px; }
  .tt-slot { background: #eff6ff; border-left: 3px solid var(--primary-light); padding: 4px 6px; border-radius: 4px; font-size: 11px; }
  .tt-slot.math { background: #fffbeb; border-color: var(--accent); }
  .tt-slot.science { background: #f0fdf4; border-color: var(--accent2); }
  .tt-slot.lang { background: #fdf4ff; border-color: #a855f7; }

  /* PAIEMENTS */
  .payment-card {
    display: flex; align-items: center; gap: 14px;
    padding: 14px; border: 1px solid var(--border); border-radius: 10px; background: white;
  }
  .payment-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

  /* ANNOUNCEMENTS */
  .announce-item { padding: 16px; border-left: 4px solid var(--primary-light); background: white; border-radius: 0 8px 8px 0; box-shadow: var(--shadow); margin-bottom: 12px; }
  .announce-item.urgent { border-color: var(--danger); }
  .announce-item.info { border-color: var(--accent2); }
  .announce-item h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .announce-item p { font-size: 13px; color: var(--text2); }
  .announce-item .meta { font-size: 11px; color: var(--text3); margin-top: 6px; }

  /* SCROLL */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width .5s; }

  .info-box { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .info-box.blue { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
  .info-box.green { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  .info-box.amber { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
</style>
</head>

<!-- SIDEBAR OVERLAY mobile -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- MAIN APP -->
<div id="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">F</div>
      <div class="sidebar-brand-text">
        <h2>FEBA</h2>
        <p>Gestion Scolaire</p>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-user" onclick="logout()">
      <div class="sidebar-user-avatar" id="user-avatar">A</div>
      <div class="sidebar-user-info">
        <p id="user-name">Administrateur</p>
        <span id="user-role-label">Admin</span>
      </div>
      <span style="color:rgba(255,255,255,.4); font-size:18px;">⇠</span>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;font-size:20px;display:none;" id="menu-btn">☰</button>

function getClasse(id) { return DATA.classes.find(c => c.id === id) || {}; }
function getMatiere(id) { return DATA.matieres.find(m => m.id === id) || {}; }
function getEleve(id) { return DATA.eleves.find(e => e.id === id) || {}; }
function getParent(id) { return DATA.parents.find(p => p.id === id) || {}; }
function avatarColor(n) { const c = ['#2563a8','#f59e0b','#10b981','#8b5cf6','#ef4444','#0891b2','#d97706']; return c[n % c.length]; }
function initials(nom, prenom) { return (prenom?.[0] || '') + (nom?.[0] || ''); }
function fmt(n) { return n?.toLocaleString('fr-FR') || '0'; }
function age(dob) { const d = new Date(dob), now = new Date(); return now.getFullYear() - d.getFullYear(); }
function fmtDate(d) { if (!d) return '–'; const dt = new Date(d); return dt.toLocaleDateString('fr-FR'); }

function moyenne(eleveId) {
  const notes = DATA.notes.filter(n => n.eleve_id === eleveId);
  if (!notes.length) return null;
  const total = notes.reduce((s, n) => s + n.note, 0);
  return (total / notes.length).toFixed(2);
}

function mention(m) {
  if (!m) return '';
  const v = parseFloat(m);
  if (v >= 16) return '<span class="badge badge-green">Excellent</span>';
  if (v >= 14) return '<span class="badge badge-blue">Bien</span>';
  if (v >= 12) return '<span class="badge badge-amber">Assez Bien</span>';
  if (v >= 10) return '<span class="badge badge-gray">Passable</span>';
  return '<span class="badge badge-red">Insuffisant</span>';
}

    [{ label: 'Anglais', type:'lang' }, { label: 'Mathématiques', type:'math' }, { label: 'Français', type:'lang' }, null, { label: 'EPS', type:'science' }],
    [null, null, null, null, null],

    [null, null, null, null, null],
  ];

  return `

// ============================================================
// MODAL HELPERS
// ============================================================
function openModal(title, body, footer = '') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer || `
    <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
    <button class="btn btn-primary" onclick="saveModal()">Enregistrer</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOnOverlay(e) { if (e.target.id === 'modal-overlay') closeModal(); }
function saveModal() {
  closeModal();
  showToast('✅ Enregistré avec succès !');
}
function modalNouvelEleve() { openModal('Nouvel élève', formNouvelEleve()); }
function modalEleveDetail(id) {
  const el = getEleve(id);
  const cls = getClasse(el.classe_id);
  const par = getParent(el.parent_id);
  const moy = moyenne(id);
  const abs = DATA.absences.filter(a => a.eleve_id === id).length;
  openModal(`${el.prenom} ${el.nom}`, `
    <div style="text-align:center;margin-bottom:20px;">
      <div style="width:64px;height:64px;border-radius:50%;background:${avatarColor(el.id)};display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:22px;margin:0 auto 10px;">${initials(el.nom,el.prenom)}</div>
      <h3>${el.prenom} ${el.nom}</h3>
      <code style="font-size:12px;background:var(--surface2);padding:2px 8px;border-radius:4px;">${el.matricule}</code>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      ${[['Classe', cls.nom],['Sexe', el.sexe==='F'?'Féminin':'Masculin'],['Âge', age(el.dob)+' ans'],['Parent', par.prenom+' '+par.nom],['Moyenne', (moy||'N/A')+'/20'],['Absences', abs]].map(([k,v])=>`
      <div style="padding:10px;background:var(--surface2);border-radius:8px;">
        <p style="font-size:11px;color:var(--text3);">${k}</p>
        <p style="font-weight:700;font-size:14px;">${v}</p>
      </div>`).join('')}
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Fermer</button><button class="btn btn-primary" onclick="showPage('notes');closeModal();">Voir les notes</button>`
  );
}
function modalEditerEleve(id) { openModal('Modifier l\'élève', formNouvelEleve()); }
function deleteNote(id) { if(confirm('Supprimer cette note ?')) { DATA.notes = DATA.notes.filter(n=>n.id!==id); showPage('notes'); } }
function justifierAbsence(id) { openModal('Justifier l\'absence', `<div class="form-group"><label>Motif</label><input type="text" placeholder="Motif..."></div>`); }

// TOAST
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1a3c5e;color:white;padding:12px 20px;border-radius:10px;font-size:14px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.2);font-family:DM Sans,sans-serif;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// TABLE FILTER
function filterTable(input, tableId) {
  const q = input.value.toLowerCase();
  const rows = document.querySelectorAll(`#${tableId} tbody tr`);
  rows.forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function filterByClasse(select) {
  const val = select.value;
  const rows = document.querySelectorAll('#eleves-table tbody tr');
  rows.forEach(r => {
    if (!val) { r.style.display = ''; return; }
    const cls = r.querySelector('.badge.badge-blue');
    if (cls) {
      const classeName = getClasse(parseInt(val)).nom;
      r.style.display = cls.textContent === classeName ? '' : 'none';
    }
  });
}

// TAB SWITCH
function switchTab(btn, targetId) {
  const parent = btn.closest('.card, .content, #page-content');
  parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  parent.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
  const target = parent.querySelector('#' + targetId) || document.getElementById(targetId);
  if (target) target.style.display = 'block';
}

// SIDEBAR TOGGLE
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('visible');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}

// Responsive: show menu button on mobile
function initResponsive() {
  const btn = document.getElementById('menu-btn');
  if (window.innerWidth <= 768) {
    btn.style.display = 'block';
  } else {
    btn.style.display = 'none';
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('visible');
  }
}

window.addEventListener('resize', initResponsive);
initResponsive();

// Close sidebar on nav item click (mobile)
document.addEventListener('click', function(e) {
  if (e.target.closest('.nav-item') && window.innerWidth <= 768) {
    closeSidebar();
  }
});
</script>
